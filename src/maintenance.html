<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rusty Links - Under Maintenance</title>
    <style>
      :root {
        --bg: #1a1a2e;
        --text: #e0e0e0;
        --text-secondary: #a0a0b0;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .maintenance-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 60px 20px;
      }
      .maintenance-icon {
        font-size: 4em;
        margin-bottom: 20px;
      }
      .maintenance-container h1 {
        font-size: 2em;
        margin-bottom: 16px;
      }
      .maintenance-message {
        color: var(--text-secondary);
        font-size: 1.1em;
        max-width: 500px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="maintenance-container">
      <div class="maintenance-icon">&#128736;</div>
      <h1>Under Maintenance</h1>
      <p class="maintenance-message">{{MAINTENANCE_MESSAGE}}</p>
      <p class="maintenance-message" style="margin-top: 24px;">We'll be back shortly. Please try again later.</p>
    </div>
  </body>
</html>
