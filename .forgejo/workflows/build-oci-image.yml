---

# Build OCI image and push to Forgejo Container Registry.
name: Build OCI container

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - "src/**"
      - "migrations/**"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "tailwind.css"
      - "Dockerfile"
      - "oci-build/**"
      - ".forgejo/workflows/build-oci-image.yml"

jobs:
  build-and-push:
    name: Build and push rusty-links
    runs-on: ${{ vars.RUNS_ON_OPENSUSE_BASE_LATEST }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REGISTRY: ""
      REGISTRY_PROVIDER: dev.a8n.run
      REGISTRY_OWNER: ${{ vars.A8N_TOOLS_PRIVATE_PACKAGE_OWNER }}
      REGISTRY_USER: ""
      REGISTRY_PASSWORD: ${{ secrets.A8N_TOOLS_PRIVATE_PACKAGE_PAT }}

    steps:
      - name: Clone the repository
        uses: https://code.forgejo.org/actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify Docker availability
        run: |
          docker version
          docker buildx version

      - name: Set up buildx builder
        run: |
          docker buildx create --name container-builder --driver docker-container --use

      - name: Set environment variables
        shell: nu {0}
        run: |
          let owner = $env.REGISTRY_OWNER
          $"REGISTRY_USER=($owner)\n" | save --append $env.GITHUB_ENV
          $"IMAGE_REGISTRY=($env.REGISTRY_PROVIDER)/($owner)\n" | save --append $env.GITHUB_ENV

      - name: Get image tags
        id: get-tags
        shell: nu {0}
        run: |
          let tags = (^nu oci-build/get-tags.nu --joined)
          $"tags=($tags)\n" | save --append $env.GITHUB_OUTPUT

      - name: Get build metadata
        id: build-meta
        shell: nu {0}
        run: |
          let version = (^git describe --tags --always --dirty | str trim)
          let git_hash = (^git rev-parse --short=12 HEAD | str trim)
          let build_date = (date now | format date "%Y-%m-%dT%H:%M:%SZ")
          $"version=($version)\n" | save --append $env.GITHUB_OUTPUT
          $"git_hash=($git_hash)\n" | save --append $env.GITHUB_OUTPUT
          $"build_date=($build_date)\n" | save --append $env.GITHUB_OUTPUT
          print $"version=($version) git_hash=($git_hash) build_date=($build_date)"

      - name: Log in to container registry
        shell: nu {0}
        run: |
          ^docker login --username $env.REGISTRY_USER --password $env.REGISTRY_PASSWORD $env.REGISTRY_PROVIDER

      - name: Build and push image
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "rusty-links"
          let registry = $env.IMAGE_REGISTRY
          let tag_args = ($tags | each {|tag| [-t $"($registry)/($image):($tag)"]} | flatten)
          let cache_ref = $"($registry)/($image):buildcache"
          let cache_from = $"type=registry,ref=($cache_ref)"
          let cache_to = $"type=registry,ref=($cache_ref),mode=max,ignore-error=true"
          print $"Building and pushing ($image) with tags: ($tags_str)"
          # --iidfile captures the pushed manifest digest for the verify step below.
          (
            ^docker buildx build
              --push
              --iidfile /tmp/image-digest.txt
              --cache-from $cache_from
              --cache-to $cache_to
              ...$tag_args
              -f oci-build/Dockerfile
              .
          )

      - name: Verify pushed image
        shell: nu {0}
        run: |
          # Guard against a silent no-op publish: assert every pushed tag resolves
          # in the registry to the digest buildx just reported pushing. A mismatch
          # (or a missing tag) fails the job instead of reporting a green build that
          # did not actually update the registry.
          #
          # The docker-container buildx driver attaches a provenance attestation by
          # default, so the pushed ref is always an OCI image index (platform image
          # + an unknown/unknown attestation manifest). For an index, the template
          # `{{.Manifest.Digest}}` does NOT reduce to the digest: buildx falls back
          # to its full human-readable dump, so the captured value never equals the
          # pushed digest and the job fails on every build (LINKS-24). Render the
          # index descriptor as JSON and pull `.digest` instead, which yields the
          # bare index digest that matches the --iidfile value.
          let pushed = (open --raw /tmp/image-digest.txt | str trim)
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "rusty-links"
          let registry = $env.IMAGE_REGISTRY
          print $"Pushed digest: ($pushed)"
          for tag in $tags {
            let ref = $"($registry)/($image):($tag)"
            let remote = (^docker buildx imagetools inspect $ref --format "{{json .Manifest}}" | from json | get digest | str trim)
            if $remote != $pushed {
              print $"DIGEST MISMATCH for ($ref): registry has ($remote), expected ($pushed)"
              exit 1
            }
            print $"Verified ($ref) -> ($remote)"
          }

      - name: Print image URLs
        shell: nu {0}
        run: |
          let tags_str = "${{ steps.get-tags.outputs.tags }}"
          let tags = ($tags_str | split row ",")
          let image = "rusty-links"
          let registry = $env.IMAGE_REGISTRY
          for tag in $tags {
            print $"Image pushed to ($registry)/($image):($tag)"
          }
